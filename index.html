<!DOCTYPE html>
<html lang="en" class="dark">
  <head>

    <!-- Primary Meta -->

    <meta
      name="keywords"
      content="Pranay Jadhav, Full Stack Developer, React Developer, Next.js, TypeScript, MERN Stack, Node.js, Portfolio"

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://jpranays.netlify.app/" />

  <body class="bg-base text-slate-100 font-sans antialiased">
    <div id="root"></div>

    <!-- Netlify Forms hidden form for form detection -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
    </form>

    <script type="module" src="/src/main.jsx"></script>
